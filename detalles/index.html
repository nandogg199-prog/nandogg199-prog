<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Detalles | Irene y Fernando</title>
  <link rel="stylesheet" href="../assets/site.css">
  <meta name="robots" content="noindex">
</head>
<body>
  <main class="page">
    <div class="wrap">
      <section class="hero">
        <p class="kicker">Detalles de la boda</p>
        <h1 class="title" id="pareja"></h1>
        <p class="subtitle" id="fecha"></p>
        <div class="actions">
          <a class="button" id="volverLink" href="/">Volver</a>
          <a class="button primary" id="confirmarLink" href="../confirmar/">Confirmar asistencia</a>
        </div>
      </section>

      <section class="grid" id="detallesGrid"></section>

      <footer class="small">
        Todo este contenido se edita en <strong>assets/site-config.js</strong>.
      </footer>
    </div>
  </main>

  <script src="../assets/site-config.js"></script>
  <script>
    const cfg = window.WEDDING_CONFIG;
    document.getElementById("pareja").textContent = cfg.pareja;
    document.getElementById("fecha").textContent = cfg.fecha;
    document.getElementById("volverLink").textContent = cfg.botonRegreso;

    const params = new URLSearchParams(window.location.search);
    const code = params.get("codigo");
    if (code) {
      document.getElementById("confirmarLink").href = `../confirmar/?codigo=${encodeURIComponent(code)}`;
      document.getElementById("volverLink").href = `../?codigo=${encodeURIComponent(code)}`;
    }

    const grid = document.getElementById("detallesGrid");
    cfg.detalles.forEach((item) => {
      const card = document.createElement("article");
      card.className = "section-card";
      card.innerHTML = `<h2>${item.titulo}</h2><p>${item.texto}</p>`;
      grid.appendChild(card);
    });
  </script>
</body>
</html>
