  <style>
    :root {
      --bg: #f8f3f1;
      --text: #5d4a46;
      --accent: #cfa39b;
      --accent-dark: #9a6f69;
      --shadow: 0 18px 45px rgba(94, 73, 69, 0.12);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top, rgba(223, 191, 186, 0.35), transparent 26%),
        linear-gradient(180deg, #faf6f4 0%, var(--bg) 100%);
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .wrap {
      width: min(100%, 560px);
    }

    .card {
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(207, 163, 155, 0.35);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .invitation {
      position: relative;
      width: 100%;
      margin: 0;
      border-radius: 18px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 10px 25px rgba(94, 73, 69, 0.09);
      line-height: 0;
    }

    .invitation img {
      width: 100%;
      height: auto;
      display: block;
    }

    .rsvp-button {
      position: absolute;
      left: 41.2%;
      top: 90.7%;
      width: 19.9%;
      min-height: 56px;
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
      padding: 10px;
      text-align: center;
      text-decoration: none;
      color: var(--accent-dark);
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(248,240,238,0.98));
      border: 1.5px solid rgba(207, 163, 155, 0.9);
      border-radius: 16px;
      box-shadow: 0 10px 18px rgba(94, 73, 69, 0.14);
      font-size: clamp(10px, 1.8vw, 13px);
      line-height: 1.15;
      letter-spacing: .02em;
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .rsvp-button strong {
      display: block;
      font-size: 1.02em;
      margin-bottom: 4px;
    }

    .rsvp-button:hover,
    .rsvp-button:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 14px 24px rgba(94, 73, 69, 0.18);
      outline: none;
    }

    .fallback {
      margin: 18px 4px 2px;
      text-align: center;
      font-size: 15px;
      line-height: 1.5;
    }

    .fallback a {
      color: var(--accent-dark);
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    .note {
      margin-top: 12px;
      text-align: center;
      font-size: 12px;
      color: rgba(93, 74, 70, 0.78);
    }

    code {
      background: rgba(207, 163, 155, 0.14);
      padding: 2px 6px;
      border-radius: 6px;
    }

    @media (max-width: 520px) {
      .page { padding: 14px; }
      .card { padding: 12px; border-radius: 20px; }
      .rsvp-button {
        border-radius: 14px;
        font-size: 11px;
      }
      .fallback { font-size: 14px; }
    }
  </style>
